# ============================================================
# AI-Powered Linux Network Threat Analyzer
# config/config.ini
# ============================================================
# This file controls all settings for the analyzer.
# Edit values here without touching the source code.
# ============================================================

[GENERAL]
# App name shown in dashboard and reports
app_name = AI Network Threat Analyzer
# Version of your project
version = 1.0.0
# Set to DEBUG for development, INFO for production
log_level = INFO

[NETWORK]
# Network interface to capture packets on.
# Use 'any' for all interfaces, or specify like 'eth0', 'wlan0'
# Run 'ip link show' in terminal to list your interfaces
interface = any
# How many seconds between processing packet batches
capture_interval = 5
# Maximum packets to store in memory at once
packet_buffer_size = 1000

[THRESHOLDS]
# Number of connection attempts in time window before port scan alert
port_scan_threshold = 15
# Number of failed logins before brute force alert
brute_force_threshold = 5
# Time window (seconds) for brute force detection
brute_force_window = 60
# Number of ICMP packets per second to trigger flood alert
icmp_flood_threshold = 100

[DATABASE]
# Path to the SQLite database file (relative to project root)
db_path = database/threats.db
# How many days to keep old records before cleanup
data_retention_days = 30

[DASHBOARD]
# IP address the Flask dashboard listens on
host = 127.0.0.1
# Port for the web dashboard
port = 5000
# Set to false in production
debug = false
# Secret key for Flask sessions - CHANGE THIS in production!
secret_key = change_this_to_a_random_string_in_production

[REPORTS]
# Directory to save CSV reports
csv_dir = reports/csv
# Directory to save PDF reports
pdf_dir = reports/pdf
# Auto-generate report every N minutes (0 = disabled)
auto_report_interval = 60

[IP_REPUTATION]
# Set to true to enable live IP reputation lookups
enabled = false
# API key for AbuseIPDB (get free key at abuseipdb.com)
abuseipdb_api_key = YOUR_API_KEY_HERE
# Cache reputation results for N seconds to avoid API limits
cache_ttl = 3600

[AUTH_LOG]
# Path to Linux authentication log file
# Ubuntu/Debian: /var/log/auth.log
# CentOS/RHEL:   /var/log/secure
log_path = /var/log/auth.log
# Check for changes every N seconds
poll_interval = 2

[AI]
# Enable the ML-based anomaly detection engine
enabled = true
# How many packets to collect before training the model
min_training_samples = 100
# IsolationForest contamination rate (0.01 = expect 1% anomalies)
contamination = 0.05
# Retrain model every N minutes
retrain_interval = 30
